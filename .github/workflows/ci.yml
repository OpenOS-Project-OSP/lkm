name: CI

on:
  push:
    branches: ["main", "feat/**", "fix/**"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: pytest / Python ${{ matrix.python }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-22.04]
        python: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip

      - name: Install
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check lkm/

      - name: Test
        run: pytest --tb=short --cov=lkm --cov-report=term-missing

      - name: Upload coverage
        if: matrix.python == '3.12' && matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: .coverage

  test-alpine:
    name: pytest / Python 3.12 / Alpine
    runs-on: ubuntu-latest
    container: python:3.12-alpine

    steps:
      - uses: actions/checkout@v4

      - name: Install build deps
        run: apk add --no-cache gcc musl-dev linux-headers

      - name: Install
        # PySide6 has no musl wheel; use dev-no-gui to skip it on Alpine
        run: pip install -e ".[dev-no-gui]"

      - name: Test
        run: python -m pytest --tb=short

  type-check:
    name: mypy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: pip install -e ".[dev]"

      - name: Type check
        run: mypy lkm/ --ignore-missing-imports

  integration-apt:
    name: Integration / apt (Ubuntu)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: pip install -e ".[dev]"

      - name: Integration tests (apt)
        run: sudo -E python -m pytest tests/integration/test_apt_backend.py -v --tb=short

  integration-xbps:
    name: Integration / xbps (Void Linux)
    runs-on: ubuntu-latest
    container: ghcr.io/void-linux/void-linux:latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Python + xbps
        run: xbps-install -Sy python3 python3-pip

      - name: Install lkm
        run: pip3 install -e ".[dev]" --break-system-packages

      - name: Integration tests (xbps)
        run: python3 -m pytest tests/integration/test_xbps_backend.py -v --tb=short

  integration-pacman:
    name: Integration / pacman (Arch Linux)
    runs-on: ubuntu-latest
    container: archlinux:latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Python
        run: pacman -Sy --noconfirm python python-pip

      - name: Install lkm
        run: pip install -e ".[dev]" --break-system-packages

      - name: Integration tests (pacman)
        run: python -m pytest tests/integration/test_pacman_backend.py -v --tb=short
