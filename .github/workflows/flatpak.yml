name: Flatpak

on:
  push:
    tags:
      - 'v*'
  pull_request:
    paths:
      - 'pkg/flatpak/**'
  workflow_dispatch:

jobs:
  build:
    name: Build & validate Flatpak
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install flatpak-builder
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            flatpak flatpak-builder elfutils librsvg2-common

      - name: Add Flathub remote
        run: |
          sudo flatpak remote-add --if-not-exists flathub \
            https://dl.flathub.org/repo/flathub.flatpakrepo

      - name: Install KDE runtime & SDK
        run: |
          sudo flatpak install -y --noninteractive flathub \
            org.kde.Platform//6.7 \
            org.kde.Sdk//6.7

      - name: Build Flatpak
        run: |
          flatpak-builder --force-clean --disable-rofiles-fuse \
            build-dir pkg/flatpak/io.github.lkm.lkm.yml

      - name: Check required files
        run: |
          if [ ! -f pkg/flatpak/io.github.lkm.lkm.metainfo.xml ]; then
            echo "Required metainfo file is missing!"
            exit 1
          fi
          if [ ! -f pkg/flatpak/io.github.lkm.lkm.desktop ]; then
            echo "Required desktop file is missing!"
            exit 1
          fi
          if [ ! -f pkg/flatpak/io.github.lkm.lkm.svg ]; then
            echo "Required icon file is missing!"
            exit 1
          fi

      - name: Validate metainfo
        run: |
          flatpak run --command=appstreamcli org.kde.Sdk//6.7 \
            validate pkg/flatpak/io.github.lkm.lkm.metainfo.xml

      - name: Prepare files for appstreamcli compose
        run: |
          mkdir -p build-dir/files/share/metainfo
          mkdir -p build-dir/files/share/applications
          mkdir -p build-dir/files/share/icons/hicolor/scalable/apps
          cp pkg/flatpak/io.github.lkm.lkm.metainfo.xml build-dir/files/share/metainfo/
          cp pkg/flatpak/io.github.lkm.lkm.desktop build-dir/files/share/applications/
          cp pkg/flatpak/io.github.lkm.lkm.svg build-dir/files/share/icons/hicolor/scalable/apps/

      - name: Check appstreamcli compose requirements
        run: |
          if [ ! -f build-dir/files/share/metainfo/io.github.lkm.lkm.metainfo.xml ]; then
            echo "Required metainfo file is missing for appstreamcli compose!"
            exit 1
          fi
          if [ ! -f build-dir/files/share/applications/io.github.lkm.lkm.desktop ]; then
            echo "Required desktop file is missing for appstreamcli compose!"
            exit 1
          fi
          if [ ! -f build-dir/files/share/icons/hicolor/scalable/apps/io.github.lkm.lkm.svg ]; then
            echo "Required icon file is missing for appstreamcli compose!"
            exit 1
          fi

      - name: Run appstreamcli compose
        run: |
          flatpak run --command=appstreamcli org.kde.Sdk//6.7 \
            compose build-dir/files

      - name: Export bundle
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          flatpak build-export repo build-dir
          flatpak build-bundle repo LKM.flatpak io.github.lkm.lkm

      - name: Upload bundle artifact
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: LKM-flatpak
          path: LKM.flatpak
          if-no-files-found: error

  release:
    name: Attach to GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: LKM-flatpak
          path: dist/

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/LKM.flatpak
